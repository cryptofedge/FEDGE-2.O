<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEDGE 2.O — Access Granted</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --orange:#FF7A00; --green:#00e57a; --black:#000000; --white:#ffffff; --grey:#1a1a1a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .bg-grid { position:fixed; inset:0; z-index:0;
    background-image: linear-gradient(rgba(0,229,122,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,229,122,0.03) 1px,transparent 1px);
    background-size:40px 40px; }
  .glow-orb { position:fixed; width:500px; height:500px; border-radius:50%;
    background:radial-gradient(circle,rgba(0,229,122,0.08) 0%,transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    pointer-events:none; z-index:0; animation:orbExpand 2s ease-out both; }
  @keyframes orbExpand { from { opacity:0; transform:translate(-50%,-50%) scale(0.3); } to { opacity:1; transform:translate(-50%,-50%) scale(1); } }
  .card { position:relative; z-index:1; background:var(--grey);
    border:1px solid rgba(0,229,122,0.25); border-radius:16px; padding:48px 40px;
    width:100%; max-width:420px; text-align:center;
    box-shadow:0 0 60px rgba(0,229,122,0.08),0 20px 40px rgba(0,0,0,0.6);
    animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s both; }
  @keyframes cardIn { from { opacity:0; transform:translateY(30px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
  .logo-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:24px; gap:12px; }
  .logo-img { width:120px; height:120px; object-fit:contain;
    filter:drop-shadow(0 0 18px rgba(255,122,0,0.7));
    animation:logoPulse 3s ease-in-out infinite; }
  @keyframes logoPulse {
    0%,100% { filter:drop-shadow(0 0 18px rgba(255,122,0,0.7)); }
    50% { filter:drop-shadow(0 0 32px rgba(255,122,0,1)); } }
  .brand-name { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:6px; color:var(--white); line-height:1; }
  .brand-name span { color:var(--orange); }
  .check-circle { width:72px; height:72px; border-radius:50%;
    background:rgba(0,229,122,0.1); border:2px solid rgba(0,229,122,0.4);
    display:flex; align-items:center; justify-content:center; margin:0 auto 24px;
    animation:checkPop 0.5s cubic-bezier(0.16,1,0.3,1) 0.6s both; }
  @keyframes checkPop { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }
  .check-icon { font-size:32px; line-height:1; animation:checkIn 0.4s ease 0.9s both; }
  @keyframes checkIn { from { opacity:0; transform:scale(0); } to { opacity:1; transform:scale(1); } }
  .divider { width:60px; height:2px; background:linear-gradient(90deg,transparent,var(--green),transparent); margin:0 auto 24px; }
  .headline { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:4px; color:var(--green);
    text-shadow:0 0 20px rgba(0,229,122,0.3); margin-bottom:8px; }
  .subtext { font-size:13px; font-weight:300; color:rgba(255,255,255,0.5); line-height:1.6; margin-bottom:28px; }
  .badge { display:inline-flex; align-items:center; gap:6px;
    background:rgba(0,229,122,0.08); border:1px solid rgba(0,229,122,0.2);
    border-radius:20px; padding:6px 14px; font-size:11px; letter-spacing:2px;
    color:var(--green); text-transform:uppercase; margin-bottom:28px; }
  .badge-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:blink 1.5s ease-in-out infinite; }
  .welcome-box { background:rgba(0,229,122,0.05); border:1px solid rgba(0,229,122,0.15); border-radius:10px; padding:20px; margin-bottom:28px; }
  .welcome-text { font-size:14px; color:rgba(255,255,255,0.7); line-height:1.7; }
  .welcome-text strong { color:var(--white); }
  .welcome-text .highlight { color:var(--orange); font-weight:600; }
  .footer { font-size:10px; letter-spacing:2px; color:rgba(255,122,0,0.4); text-transform:uppercase; }
  .pulse-dot { display:inline-block; width:6px; height:6px; background:var(--orange); border-radius:50%; margin-right:6px; vertical-align:middle; animation:blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
</style>
</head>
